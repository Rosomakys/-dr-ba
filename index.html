<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Údržba - Služby</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; text-align: center; padding: 20px; }
        .box { padding: 25px; border-radius: 12px; font-size: 1.8rem; font-weight: bold; margin-bottom: 20px; }
        .Zelená { background: #2e7d32; } .Červená { background: #c62828; }
        .Modrá { background: #1565c0; } .Šedá { background: #424242; }
        .sekce { text-align: left; margin: 15px 0; border-top: 1px solid #444; padding-top: 10px; }
        .karta { background: #1e1e1e; padding: 12px; margin: 6px 0; border-radius: 6px; display: flex; justify-content: space-between; }
        a { color: #81d4fa; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>
    <div id="vysledek" class="box">Načítám...</div>
    <div id="kontakty"></div>

    <script>
        // Startovní bod (dnešek 27.4.2026 je Červená noční / Zelená denní)
        // Toto pole reprezentuje cyklus 4 dnů, který se opakuje
        const cyklus = ["Zelená", "Modrá", "Červená", "Šedá"]; 
        const startDate = new Date("2026-04-27");
        
        function getSmena(den) {
            const diff = Math.floor((den - startDate) / (1000 * 60 * 60 * 24));
            // Index v poli posouváme podle rozdílu dnů
            return cyklus[(diff + 2) % 4]; 
        }

        const d = new Date();
        const h = d.getHours();
        const smena = (h >= 6 && h < 18) ? getSmena(d) : getSmena(new Date(d.getTime() - 86400000));
        
        document.getElementById('vysledek').className = 'box ' + smena;
        document.getElementById('vysledek').innerText = "Právě je: " + smena;

        const tymy = {
            "Zelená": { "Elektrikáři": [["Ulrych Roman", "77585459"], ["Reder Adam", "775429859"]], "Mechanici": [["Holinka Stanislav", "775432115"]] },
            "Červená": { "Elektrikáři": [["Zezulka Miroslav", "778760406"]], "Mechanici": [["Bolom Jakub", "778483878"], ["Šimečka Rudolf", "770143579"]] },
            "Modrá": { "Elektrikáři": [["Marsina Adam", "775854589"]], "Mechanici": [["Petrovský Jan", "770163278"]] },
            "Šedá": { "Elektrikáři": [["Průcha Josef", "770131860"]], "Mechanici": [["Schuma Daniel", "775883497"]] }
        };

        let html = "";
        for (let profese in tymy[smena]) {
            html += `<div class='sekce'><h3>${profese}</h3>` + tymy[smena][profese].map(o => 
                `<div class='karta'><span>${o[0]}</span><a href='tel:${o[1]}'>${o[1]}</a></div>`).join('') + "</div>";
        }
        document.getElementById('kontakty').innerHTML = html;
    </script>
</body>
</html>
