<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Údržba - Směny</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; margin: 0; padding: 10px; overflow-x: hidden; }
        .hlavni-karta { padding: 15px; border-radius: 12px; margin-bottom: 8px; text-align: center; }
        .Zelená { background: #1b5e20; } .Červená { background: #b71c1c; }
        .Modrá { background: #0d47a1; } .Šedá { background: #333333; }
        
        .smena-nazev { font-size: 1.8rem; font-weight: bold; margin: 0; }
        .odpocet { font-size: 0.9rem; opacity: 0.8; margin-top: 5px; }
        .priste { font-size: 0.85rem; margin-top: 10px; padding-top: 10px; border-top: 1px solid rgba(255,255,255,0.2); }

        .nadpis-sekce { font-size: 1rem; color: #aaa; margin: 15px 0 5px 5px; text-transform: uppercase; }
        .karta { background: #1a1a1a; padding: 12px; margin: 2px 0; display: flex; justify-content: space-between; border-radius: 4px; }
        .cislo { color: #4fc3f7; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>
    <div id="hlavni" class="hlavni-karta">
        <p class="smena-nazev" id="smena-text"></p>
        <div class="odpocet" id="timer"></div>
        <div class="priste" id="priste-text"></div>
    </div>
    <div id="kontakty-vypis"></div>

    <script>
        const c = "Červená", z = "Zelená", m = "Modrá", s = "Šedá";
        
        // 56denní cyklus od 1. ledna 2026 [Ranní, Noční]
        const cyklus56 = [
            [s,m], [z,c], [z,c], [z,c], [s,m], [s,m], [z,c], [z,c], // Jan 1 - Jan 8
            [m,s], [m,s], [m,s], [c,z], [c,z], [m,s], [m,s], [c,z], // Jan 9 - Jan 16
            [c,z], [c,z], [s,m], [s,m], [z,c], [z,c], [s,m], [s,m], // Jan 17 - Jan 24
            [s,m], [z,c], [z,c], [m,s], [m,s], [c,z], [c,z], [c,z], // Jan 25 - Feb 1
            [m,s], [m,s], [c,z], [c,z], [s,m], [s,m], [s,m], [z,c], // Feb 2 - Feb 9
            [z,c], [s,m], [s,m], [z,c], [z,c], [z,c], [m,s], [m,s], // Feb 10 - Feb 17
            [c,z], [c,z], [m,s], [m,s], [m,s], [c,z], [c,z], [s,m]  // Feb 18 - Feb 25
        ];

        // Start ukotven na přesné UTC půlnoci 1.1.2026
        const refDatumUtc = Date.UTC(2026, 0, 1); 

        const lide = {
            "Zelená": { "Elektrikáři": [["Ulrych Roman", "775854592"], ["Reder Adam", "775429859"], ["Kyselý Jan", "770319118"]], "Mechanici": [["Holinka Stanislav", "775432115"], ["Neubert Kamil", "778745583"], ["Paťorek Martin", "770143578"]] },
            "Červená": { "Elektrikáři": [["Zezulka Miroslav", "778760406"], ["Vitásek Martin", "778745584"], ["Tellinger Rostislav", "773795395"]], "Mechanici": [["Bolom Jakub", "778483878"], ["Broda Martin", "778482415"], ["Šimečka Rudolf", "770143579"]] },
            "Modrá": { "Elektrikáři": [["Marsina Adam", "775854589"], ["Petrovský Jan", "770163278"], ["Ertel Tomáš", "778439051"]], "Mechanici": [["Libiger Milan", "770181306"], ["Kostelník Martin", "778499086"], ["Vinkler Antonín", "778725420"]] },
            "Šedá": { "Elektrikáři": [["Průcha Josef", "770131860"], ["Schuma Daniel", "775883497"]], "Mechanici": [["Genčur Miroslav", "775541160"], ["Wimmer Jan", "773745213"], ["Vondrášek Jiří", "778499082"]] }
        };

        function aktualizuj() {
            const ted = new Date();
            const h = ted.getHours();
            
            // Posuneme čas o 6 hodin zpět, takže noc do 5:59 patří ještě do včerejška
            const logickyCas = new Date(ted.getTime() - 6 * 60 * 60 * 1000);
            
            // Vytvoříme UTC datum pro bezpečný výpočet dnů bez vlivu letního/zimního času
            const aktualniDenUtc = Date.UTC(logickyCas.getFullYear(), logickyCas.getMonth(), logickyCas.getDate());
            
            // Výpočet indexu v 56denním cyklu
            const rozdilDnu = Math.floor((aktualniDenUtc - refDatumUtc) / (1000 * 60 * 60 * 24));
            const indexDne = ((rozdilDnu % 56) + 56) % 56;
            
            const jeDen = (h >= 6 && h < 18);
            
            // Určení směn
            const aktualniSmena = jeDen ? cyklus56[indexDne][0] : cyklus56[indexDne][1];
            const pristiSmena = jeDen ? cyklus56[indexDne][1] : cyklus56[(indexDne + 1) % 56][0];

            // Vykreslení UI
            const hlavni = document.getElementById('hlavni');
            hlavni.className = 'hlavni-karta ' + aktualniSmena;
            document.getElementById('smena-text').innerText = aktualniSmena;
            document.getElementById('priste-text').innerText = "Příště: " + pristiSmena;

            // Odpočet
            const konecH = jeDen ? 18 : (h >= 18 ? 30 : 6);
            const minZbyva = (konecH * 60) - (h * 60 + ted.getMinutes());
            document.getElementById('timer').innerText = `Končí za: ${Math.floor(minZbyva/60)}h ${minZbyva%60}m`;

            // Kontakty
            let html = "";
            for (let profese in lide[aktualniSmena]) {
                html += `<div class="nadpis-sekce">${profese}</div>`;
                lide[aktualniSmena][profese].forEach(o => html += `<div class="karta"><span>${o[0]}</span><a class="cislo" href="tel:${o[1]}">${o[1]}</a></div>`);
            }
            document.getElementById('kontakty-vypis').innerHTML = html;
        }

        aktualizuj();
        setInterval(aktualizuj, 60000);
    </script>
</body>
</html>
