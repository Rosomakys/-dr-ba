<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Údržba - Směny</title>
    <style>
        body { font-family: -apple-system, sans-serif; background: #000; color: #fff; margin: 0; padding: 10px; }
        .hlavni-karta { padding: 15px; border-radius: 12px; margin-bottom: 10px; text-align: center; }
        .Zelená { background: #1b5e20; } .Červená { background: #b71c1c; }
        .Modrá { background: #0d47a1; } .Šedá { background: #333333; }
        .smena-nazev { font-size: 1.8rem; font-weight: bold; margin: 0; }
        .odpocet { font-size: 0.9rem; opacity: 0.8; margin-top: 5px; }
        .nadpis-sekce { font-size: 1rem; color: #aaa; margin: 15px 0 5px 5px; text-align: left; }
        .kontakt-row { background: #1a1a1a; padding: 12px; margin-bottom: 2px; display: flex; justify-content: space-between; border-radius: 4px; }
        .cislo { color: #4fc3f7; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div id="hlavni" class="hlavni-karta">
        <p class="smena-nazev" id="smena-text"></p>
        <div class="odpocet" id="timer"></div>
    </div>
    <div id="kontakty-vypis"></div>

    <script>
        // Tabulka pro rok 2026: [Ranni, Nocni]
        const kalendar = {
            "2026-04-27": ["Zelená", "Modrá"], "2026-04-28": ["Zelená", "Modrá"],
            "2026-04-29": ["Šedá", "Červená"], "2026-04-30": ["Šedá", "Červená"],
            // ... (zde by byl celý kalendář) ...
        };

        const lide = {
            "Zelená": { "Elektrikáři": [["Ulrych Roman", "775854592"], ["Reder Adam", "775429859"], ["Kyselý Jan", "770319118"]], "Mechanici": [["Holinka Stanislav", "775432115"], ["Neubert Kamil", "778745583"], ["Paťorek Martin", "770143578"]] },
            "Červená": { "Elektrikáři": [["Zezulka Miroslav", "778760406"], ["Vitásek Martin", "778745584"], ["Tellinger Rostislav", "773795395"]], "Mechanici": [["Bolom Jakub", "778483878"], ["Broda Martin", "778482415"], ["Šimečka Rudolf", "770143579"]] },
            "Modrá": { "Elektrikáři": [["Marsina Adam", "775854589"], ["Petrovský Jan", "770163278"], ["Ertel Tomáš", "778439051"]], "Mechanici": [["Libiger Milan", "770181306"], ["Kostelník Martin", "778499086"], ["Vinkler Antonín", "778725420"]] },
            "Šedá": { "Elektrikáři": [["Průcha Josef", "770131860"], ["Schuma Daniel", "775883497"]], "Mechanici": [["Genčur Miroslav", "775541160"], ["Wimmer Jan", "773745213"], ["Vondrášek Jiří", "778499082"]] }
        };

        function aktualizuj() {
            const ted = new Date();
            const d = ted.toISOString().split('T')[0];
            const h = ted.getHours();
            
            // Logika: před 6:00 ráno patří ještě k včerejší noci
            const klavesa = (h < 6) ? new Date(ted.getTime() - 86400000).toISOString().split('T')[0] : d;
            const smena = (h >= 6 && h < 18) ? kalendar[klavesa][0] : kalendar[klavesa][1];

            document.getElementById('hlavni').className = 'hlavni-karta ' + smena;
            document.getElementById('smena-text').innerText = smena;
            
            // Jednoduchý odpočet
            const konecH = (h >= 6 && h < 18) ? 18 : (h >= 18 ? 30 : 6);
            const zbyvaMin = (konecH * 60) - (h * 60 + ted.getMinutes());
            document.getElementById('timer').innerText = `Končí za: ${Math.floor(zbyvaMin/60)}h ${zbyvaMin%60}m`;

            // Kontakty
            let html = "";
            for (let p in lide[smena]) {
                html += `<div class="nadpis-sekce">${p}</div>`;
                lide[smena][p].forEach(o => html += `<div class="kontakt-row"><span>${o[0]}</span><a class="cislo" href="tel:${o[1]}">${o[1]}</a></div>`);
            }
            document.getElementById('kontakty-vypis').innerHTML = html;
        }
        aktualizuj();
    </script>
</body>
</html>
