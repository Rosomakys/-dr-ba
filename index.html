<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <title>Údržba - Služby</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: #e0e0e0; margin: 0; padding: 15px; text-align: center; }
        .box { padding: 20px; border-radius: 12px; font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; }
        .Zelená { background: #2e7d32; } .Červená { background: #c62828; }
        .Modrá { background: #1565c0; } .Šedá { background: #424242; }
        .sekce { text-align: left; margin: 15px 0; border-top: 1px solid #333; padding-top: 10px; }
        .karta { background: #1e1e1e; padding: 10px; margin: 5px 0; border-radius: 5px; display: flex; justify-content: space-between; }
        a { color: #81d4fa; font-weight: bold; text-decoration: none; }
    </style>
</head>
<body>
    <div id="box" class="box">Načítám...</div>
    <div id="cas-info" style="margin-bottom: 20px;"></div>
    <div id="kontakty"></div>

    <script>
        // SEM DOPLŇ DATUMY Z PAPÍRU
        const kalendar = { "2026-04-27": {"den": "Zelená", "noc": "Červená"}, "2026-04-28": {"den": "Červená", "noc": "Modrá"} };
        
        const tymy = {
            "Zelená": { "Elektrikáři": [["Ulrych Roman", "77585459"], ["Reder Adam", "775429859"]], "Mechanici": [["Holinka Stanislav", "775432115"]] },
            "Červená": { "Elektrikáři": [["Zezulka Miroslav", "778760406"]], "Mechanici": [["Bolom Jakub", "778483878"], ["Šimečka Rudolf", "770143579"]] }
        };

        const d = new Date();
        const h = d.getHours();
        const smena = kalendar[d.toISOString().split('T')[0]] ? (h >= 6 && h < 18 ? kalendar[d.toISOString().split('T')[0]].den : kalendar[d.toISOString().split('T')[0]].noc) : "Není v plánu";
        
        document.getElementById('box').className = 'box ' + smena;
        document.getElementById('box').innerText = "Právě je: " + smena;

        // Výpočet času do konce
        const konec = (h >= 6 && h < 18) ? 18 : 6;
        const zbyva = (konec > h) ? (konec - h) : (24 - h + konec);
        document.getElementById('cas-info').innerText = "Směna končí za " + zbyva + " hodin";

        // Výpis
        let html = "";
        for (let profese in tymy[smena]) {
            html += `<div class='sekce'><h3>${profese}</h3>` + tymy[smena][profese].map(o => 
                `<div class='karta'><span>${o[0]}</span><a href='tel:${o[1]}'>${o[1]}</a></div>`).join('') + "</div>";
        }
        document.getElementById('kontakty').innerHTML = html;
    </script>
</body>
</html>
